<div class="timeline-card">
  <div class="timeline-card__marker">
    <div class="timeline-card__icon">{{ include.item.icon }}</div>
    <span class="timeline-card__year">{{ include.item.year }}</span>
  </div>
  <div class="timeline-card__body">
    <strong>{{ include.item.title }}</strong>
    {% if include.item.detail %}
      <p class="timeline-card__detail">{{ include.item.detail }}</p>
    {% endif %}
    {% if include.item.source %}
      <p class="timeline-card__source">{{ include.item.source }}</p>
    {% endif %}
  </div>
</div>
