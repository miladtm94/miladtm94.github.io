<style>
  .experience-list {
    display: flex;
    flex-direction: column;
    gap: 1.2em;
    margin: 1em 0 2em;
  }

  .experience-details {
    padding: 1em 1.2em;
    border: 1px solid rgba(0,0,0,0.08);
    border-left: 4px solid #2a7ae2;
    border-radius: 6px;
    background: var(--global-bg-color);
  }

  .experience-details summary {
    list-style: none;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 0.4em;
    margin: 0;
    padding: 0;
    cursor: pointer;
  }

  .experience-details summary::-webkit-details-marker,
  .experience-details summary::marker {
    display: none;
  }

  .experience-details .summary-title {
    min-width: 0;
  }

  .experience-details summary > span {
    white-space: nowrap;
  }

  .experience-details .experience-type {
    font-size: 0.8em;
    font-weight: 500;
    margin-left: 0.4em;
    opacity: 0.6;
  }

  .experience-details .experience-organization {
    font-size: 0.9em;
    opacity: 0.7;
  }

  .experience-details .experience-date {
    font-size: 0.85em;
    opacity: 0.6;
    white-space: nowrap;
  }

  .experience-details .toggle-icon {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    background: rgba(42,122,226,0.12);
    color: #2a7ae2;
    font-size: 0.95em;
    transition: transform 0.2s ease;
  }

  .experience-details[open] .toggle-icon {
    transform: rotate(180deg);
  }

  .experience-details ul {
    margin: 0.9em 0 0;
    padding-left: 1.2em;
    font-size: 0.9em;
    opacity: 0.85;
    line-height: 1.65;
  }

  @media (max-width: 640px) {
    .experience-details summary {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: flex-start;
    }

    .experience-details .experience-date {
      grid-column: 1 / -1;
      grid-row: 2;
      white-space: normal;
    }

    .experience-details .toggle-icon {
      grid-column: 2;
      grid-row: 1;
    }
  }
</style>

<div class="experience-list">
  {% for item in include.items %}
    {% include experience-card.html item=item %}
  {% endfor %}
</div>
