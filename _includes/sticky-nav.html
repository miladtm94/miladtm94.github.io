<!-- Sets --masthead-h so .sticky-quicknav { position: sticky } knows where to stop -->
<script>
(function () {
  function setMastheadVar() {
    var m = document.querySelector('.masthead');
    document.documentElement.style.setProperty('--masthead-h', (m ? m.offsetHeight : 60) + 'px');
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setMastheadVar);
  } else {
    setMastheadVar();
  }
  window.addEventListener('resize', setMastheadVar, { passive: true });
})();
</script>
