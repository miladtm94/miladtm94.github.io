name: Build and Publish CV PDF

# Triggers: any push that touches the LaTeX source, OR manual trigger
on:
  push:
    paths:
      - 'files/CV.tex'
  workflow_dispatch:   # allows manual run from the GitHub Actions tab

jobs:
  build-cv:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the compiled PDF back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: files/CV.tex
          # latexmk_use_xelatex: true   # remove this line if your CV uses pdflatex

      - name: Move compiled PDF to files/
        run: mv CV.pdf files/CV.pdf

      - name: Commit and push CV.pdf
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/CV.pdf
          git commit -m "Auto-compile CV.pdf from CV.tex [skip ci]" || echo "No changes to commit"
          git push
